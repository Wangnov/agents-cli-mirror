# 纯云模式示例配置（推荐用于 GitHub Actions + R2 自定义域名）
#
# 说明：
# - 所有敏感信息（R2/S3 凭证、public_url）建议通过环境变量注入
# - GitHub Actions 里请配合 `.github/workflows/mirror-cloud-sync.yml` 使用

[server]
# 纯云模式下该值用于脚本内的默认 MIRROR_URL（例如 "https://mirror.example.com"）
# 建议通过 env: MIRROR_PUBLIC_URL 注入，而不是写死在仓库里。
installer_provider = "installer"

[cache]
dir = "./cache"
max_versions = 1

[storage]
mode = "s3"

[update]
# 纯云模式的定时刷新由 GitHub Actions 负责；这里可以关闭
enabled = false
interval_minutes = 10

[[providers]]
name = "claude"
source = "gcs_release"
upstream_url = "https://storage.googleapis.com/claude-code-dist-86c565f3-f756-42ad-8dfa-d59b1c096819/claude-code-releases"
files = [
  "darwin-x64/claude",
  "darwin-arm64/claude",
  "linux-x64/claude",
  "linux-arm64/claude",
  "linux-x64-musl/claude",
  "linux-arm64-musl/claude",
  "win32-x64/claude.exe",
  "win32-arm64/claude.exe"
]
platforms = [
  "darwin-x64",
  "darwin-arm64",
  "linux-x64",
  "linux-arm64",
  "linux-x64-musl",
  "linux-arm64-musl",
  "win32-x64",
  "win32-arm64"
]
tags = ["latest"]
update_policy = "tracking"

[providers.ui]
preset = "claude"

[[providers]]
name = "codex"
source = "github_release"
repo = "openai/codex"
tags = ["latest"]
platforms = [
  "darwin-x64",
  "darwin-arm64",
  "linux-x64",
  "linux-arm64",
  "linux-x64-musl",
  "linux-arm64-musl",
  "win32-x64",
  "win32-arm64"
]
# openai/codex 每个 release 带 ~139 个资产(CLI 的多种打包格式 + 另一个产品
# codex-app-server-* + npm .tgz + Python .whl + .dmg 等),全镜像约 5.7GB/版。
# acm-client 每个平台只会选中一个可安装归档(unix 取 .tar.gz,windows 取
# .exe.zip;Linux 的 gnu 平台经 platform_hints 回退到 musl),所以只镜像这 6 个
# 即覆盖全部 8 个声明平台,约 0.5GB/版。留空则镜像全部 release assets。
files = [
  "codex-x86_64-apple-darwin.tar.gz",
  "codex-aarch64-apple-darwin.tar.gz",
  "codex-x86_64-unknown-linux-musl.tar.gz",
  "codex-aarch64-unknown-linux-musl.tar.gz",
  "codex-x86_64-pc-windows-msvc.exe.zip",
  "codex-aarch64-pc-windows-msvc.exe.zip"
]
include_prerelease = false
update_policy = "tracking"

[providers.ui]
preset = "codex"

[[providers]]
name = "gemini"
source = "github_release"
repo = "google-gemini/gemini-cli"
tags = ["latest"]
platforms = [
  "darwin-x64",
  "darwin-arm64",
  "linux-x64",
  "linux-arm64",
  "linux-x64-musl",
  "linux-arm64-musl",
  "win32-x64",
  "win32-arm64"
]
include_prerelease = false
update_policy = "tracking"

[providers.ui]
preset = "gemini"

[[providers]]
name = "installer"
source = "github_release"
repo = "wangnov/agents-cli-mirror"
tags = ["latest"]
update_policy = "tracking"

[providers.ui]
preset = "acm"
