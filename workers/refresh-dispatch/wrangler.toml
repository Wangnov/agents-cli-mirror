name = "acm-refresh-dispatch"
main = "src/index.ts"
compatibility_date = "2026-03-04"

# 建议只绑定到 refresh 路由，避免影响 R2 自定义域名的静态直出
# routes = [
#   { pattern = "mirror.example.com/api/*/refresh", zone_name = "example.com" }
# ]

[vars]
# 触发哪个 GitHub Actions workflow
GITHUB_OWNER = "Wangnov"
GITHUB_REPO = "agents-cli-mirror"
GITHUB_WORKFLOW = "mirror-cloud-sync.yml"
GITHUB_REF = "main"

# refresh 的节流窗口（秒）。设为 0 可关闭节流。
THROTTLE_SECONDS = "30"

# 推荐绑定一个 KV 命名空间做全局节流；如果不绑，会自动退回边缘缓存节流（best effort）。
# [[kv_namespaces]]
# binding = "REFRESH_THROTTLE"
# id = "<your-kv-namespace-id>"

# Secrets（不要写进仓库）：
# - REFRESH_TOKEN: Bearer token（客户端 POST /api/{provider}/refresh 使用）
# - GITHUB_TOKEN: GitHub PAT（需要 actions:write 权限触发 workflow_dispatch）
