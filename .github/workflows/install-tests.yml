name: install-tests

on:
  workflow_dispatch:
    inputs:
      mirror_url:
        description: "Override mirror URL (optional)"
        required: false
        type: string

jobs:
  test-native:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15-intel
            name: macos-x64
          - os: macos-latest
            name: macos-arm64
          - os: windows-latest
            name: windows-x64
          - os: windows-11-arm
            name: windows-arm64
    env:
      MIRROR_URL: ${{ github.event.inputs.mirror_url || secrets.MIRROR_PUBLIC_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Ensure mirror URL configured
        shell: bash
        run: |
          test -n "$MIRROR_URL"

      - name: Probe mirror (Unix)
        if: startsWith(matrix.os, 'macos')
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL "$MIRROR_URL/api/installer/info" >/dev/null
          curl -fsSL "$MIRROR_URL/api/claude/info" >/dev/null
          curl -fsSL "$MIRROR_URL/api/codex/info" >/dev/null
          curl -fsSL "$MIRROR_URL/api/gemini/info" >/dev/null
          curl -fsSL "$MIRROR_URL/claude/install.sh" >/dev/null
          curl -fsSL "$MIRROR_URL/codex/install.sh" >/dev/null
          curl -fsSL "$MIRROR_URL/gemini/install.sh" >/dev/null

      - name: Probe mirror (Windows)
        if: startsWith(matrix.os, 'windows')
        shell: pwsh
        run: |
          Invoke-RestMethod "$env:MIRROR_URL/api/installer/info" | Out-Null
          Invoke-RestMethod "$env:MIRROR_URL/api/claude/info" | Out-Null
          Invoke-RestMethod "$env:MIRROR_URL/api/codex/info" | Out-Null
          Invoke-RestMethod "$env:MIRROR_URL/api/gemini/info" | Out-Null
          Invoke-WebRequest -Uri "$env:MIRROR_URL/claude/install.sh" -UseBasicParsing | Out-Null
          Invoke-WebRequest -Uri "$env:MIRROR_URL/codex/install.sh" -UseBasicParsing | Out-Null
          Invoke-WebRequest -Uri "$env:MIRROR_URL/gemini/install.sh" -UseBasicParsing | Out-Null

      - name: Run install tests (Unix)
        if: startsWith(matrix.os, 'macos')
        shell: bash
        run: |
          script_path="$GITHUB_WORKSPACE/.github/scripts/e2e-install-unix.sh"
          base_path="$PATH"
          export SHELL="/bin/bash"
          export HOME="$RUNNER_TEMP/home-shim"
          rm -rf "$HOME"
          mkdir -p "$HOME"
          cd "$HOME"
          PATH="$base_path" ACM_E2E_PATH_MODE=shim bash "$script_path"

          export HOME="$RUNNER_TEMP/home-reload"
          rm -rf "$HOME"
          mkdir -p "$HOME"
          cd "$HOME"
          PATH="$base_path" ACM_E2E_PATH_MODE=reload bash "$script_path"

      - name: Run install tests (Windows)
        if: startsWith(matrix.os, 'windows')
        shell: pwsh
        run: |
          $scriptPath = Join-Path $env:GITHUB_WORKSPACE ".github\scripts\e2e-install-windows.ps1"
          $env:USERPROFILE = Join-Path $env:RUNNER_TEMP "home"
          New-Item -ItemType Directory -Force -Path $env:USERPROFILE | Out-Null
          Push-Location $env:USERPROFILE
          try {
              pwsh -File $scriptPath
          } finally {
              Pop-Location
          }

  test-linux-container:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64-gnu-jammy
            platform: linux/amd64
            image: ubuntu:22.04
            install_deps: apt-get update && apt-get install -y bash curl ca-certificates python3 xz-utils
          - name: linux-x64-gnu
            platform: linux/amd64
            image: ubuntu:24.04
            install_deps: apt-get update && apt-get install -y bash curl ca-certificates python3 xz-utils
          - name: linux-arm64-gnu
            platform: linux/arm64
            image: ubuntu:24.04
            install_deps: apt-get update && apt-get install -y bash curl ca-certificates python3 xz-utils
          - name: linux-x64-musl
            platform: linux/amd64
            image: alpine:3.19
            install_deps: apk add --no-cache bash curl ca-certificates python3
          - name: linux-arm64-musl
            platform: linux/arm64
            image: alpine:3.19
            install_deps: apk add --no-cache bash curl ca-certificates python3
    env:
      MIRROR_URL: ${{ github.event.inputs.mirror_url || secrets.MIRROR_PUBLIC_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Ensure mirror URL configured
        shell: bash
        run: |
          test -n "$MIRROR_URL"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Probe mirror
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL "$MIRROR_URL/api/installer/info" >/dev/null
          curl -fsSL "$MIRROR_URL/api/claude/info" >/dev/null
          curl -fsSL "$MIRROR_URL/api/codex/info" >/dev/null
          curl -fsSL "$MIRROR_URL/api/gemini/info" >/dev/null
          curl -fsSL "$MIRROR_URL/claude/install.sh" >/dev/null
          curl -fsSL "$MIRROR_URL/codex/install.sh" >/dev/null
          curl -fsSL "$MIRROR_URL/gemini/install.sh" >/dev/null

      - name: Run install tests in container
        run: |
          docker run --rm \
            --platform ${{ matrix.platform }} \
            -e MIRROR_URL="$MIRROR_URL" \
            -e ACM_E2E_PATH_MODE="shim" \
            -e HOME="/tmp/home-shim" \
            -e SHELL="/bin/bash" \
            -v "$PWD:/work" \
            -w /work \
            ${{ matrix.image }} \
            /bin/sh -c "${{ matrix.install_deps }} && mkdir -p \$HOME && cd \$HOME && bash /work/.github/scripts/e2e-install-unix.sh"

          docker run --rm \
            --platform ${{ matrix.platform }} \
            -e MIRROR_URL="$MIRROR_URL" \
            -e ACM_E2E_PATH_MODE="reload" \
            -e HOME="/tmp/home-reload" \
            -e SHELL="/bin/bash" \
            -v "$PWD:/work" \
            -w /work \
            ${{ matrix.image }} \
            /bin/sh -c "${{ matrix.install_deps }} && mkdir -p \$HOME && cd \$HOME && bash /work/.github/scripts/e2e-install-unix.sh"
