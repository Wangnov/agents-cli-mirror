name: node-pty-prebuilds

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      version:
        description: "node-pty version"
        required: true
        default: "1.1.0"

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NODE_PTY_VERSION: ${{ inputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - uses: docker/setup-qemu-action@v3

      - name: Prepare output directories
        run: |
          set -euo pipefail
          mkdir -p out/node-pty/prebuilds
          mkdir -p tmp/node-pty

      - name: Extract upstream prebuilds (darwin/win32)
        run: |
          set -euo pipefail
          cd tmp/node-pty
          npm pack node-pty@${NODE_PTY_VERSION}
          tar -xzf node-pty-${NODE_PTY_VERSION}.tgz
          cp -R package/prebuilds/darwin-x64 ../../out/node-pty/prebuilds/
          cp -R package/prebuilds/darwin-arm64 ../../out/node-pty/prebuilds/
          cp -R package/prebuilds/win32-x64 ../../out/node-pty/prebuilds/
          cp -R package/prebuilds/win32-arm64 ../../out/node-pty/prebuilds/

      - name: Build linux prebuilds (glibc/musl)
        run: |
          set -euo pipefail

          build_linux() {
            local target="$1"
            local platform="$2"
            local image="$3"
            local libc="$4"

            echo "==> Building ${target} (${libc}) using ${image} on ${platform}"
            docker run --rm --platform "${platform}" \
              -e NODE_PTY_VERSION="${NODE_PTY_VERSION}" \
              -e TARGET="${target}" \
              -e LIBC="${libc}" \
              -v "${PWD}/out":/out \
              "${image}" sh -lc '
                set -e
                if [ "${LIBC}" = "musl" ]; then
                  apk add --no-cache python3 make g++ pkgconfig linux-headers
                else
                  export DEBIAN_FRONTEND=noninteractive
                  apt-get update
                  apt-get install -y --no-install-recommends python3 make g++ pkg-config
                fi

                mkdir -p /tmp/build
                cd /tmp/build
                npm pack node-pty@${NODE_PTY_VERSION}
                tar -xzf node-pty-${NODE_PTY_VERSION}.tgz
                cd package
                npm_config_build_from_source=true npm_config_python=/usr/bin/python3 npm install --include=dev

                out_dir="/out/node-pty/prebuilds/${TARGET}"
                mkdir -p "${out_dir}"
                cp build/Release/pty.node "${out_dir}/"
                if [ -f build/Release/spawn-helper ]; then
                  cp build/Release/spawn-helper "${out_dir}/"
                  chmod +x "${out_dir}/spawn-helper"
                fi
                chmod -R a+rX "${out_dir}"
              '
          }

          build_linux linux-x64 linux/amd64 node:24-bookworm glibc
          build_linux linux-arm64 linux/arm64 node:24-bookworm glibc
          build_linux linux-x64-musl linux/amd64 node:24-alpine musl
          build_linux linux-arm64-musl linux/arm64 node:24-alpine musl

      - name: Generate checksums
        run: |
          set -euo pipefail
          node - <<'NODE'
          const fs = require('fs');
          const path = require('path');
          const crypto = require('crypto');

          const root = path.join('out', 'node-pty', 'prebuilds');
          const result = {
            version: process.env.NODE_PTY_VERSION,
            generated_at: new Date().toISOString(),
            platforms: {}
          };

          for (const platform of fs.readdirSync(root)) {
            const dir = path.join(root, platform);
            if (!fs.statSync(dir).isDirectory()) {
              continue;
            }
            const files = {};
            for (const file of fs.readdirSync(dir)) {
              const filePath = path.join(dir, file);
              if (!fs.statSync(filePath).isFile()) {
                continue;
              }
              const data = fs.readFileSync(filePath);
              const hash = crypto.createHash('sha256').update(data).digest('hex');
              files[file] = {
                sha256: hash,
                size: fs.statSync(filePath).size,
                asset: `${platform}--${file}`
              };
            }
            result.platforms[platform] = { files };
          }

          fs.writeFileSync(
            path.join('out', 'node-pty', 'checksums.json'),
            JSON.stringify(result, null, 2)
          );
          NODE

      - name: Prepare release assets
        run: |
          set -euo pipefail
          rm -rf release
          mkdir -p release
          cp out/node-pty/checksums.json release/
          find out/node-pty/prebuilds -mindepth 2 -type f -print0 | while IFS= read -r -d '' file; do
            platform=$(basename "$(dirname "$file")")
            base=$(basename "$file")
            cp "$file" "release/${platform}--${base}"
          done

      - name: Upload assets to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          RELEASE_TAG="node-pty-v${NODE_PTY_VERSION}"
          if ! gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release create "${RELEASE_TAG}" \
              --title "node-pty ${NODE_PTY_VERSION}" \
              --notes "node-pty prebuilds for Agents CLI Mirror."
          fi
          gh release upload "${RELEASE_TAG}" release/* --clobber

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: node-pty-${{ env.NODE_PTY_VERSION }}-prebuilds
          path: out/node-pty
          if-no-files-found: error
