name: rust-ci

on:
  push:
    paths:
      - "crates/**"
      - "docs/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "dist-workspace.toml"
      - "config.toml.example"
      - ".github/workflows/rust-ci.yml"
  pull_request:
    paths:
      - "crates/**"
      - "docs/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "dist-workspace.toml"
      - "config.toml.example"
      - ".github/workflows/rust-ci.yml"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rustfmt
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace --all-targets
